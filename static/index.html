<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nyeki's Links</title>

        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <main>
            <header>
                <h1>Nyeki's Links</h1>
                <p>
                    A tiny URL shortener, by
                    <a href="https://nyeki.dev/">Nyeki</a>.
                </p>
            </header>

            <form id="form" method="POST">
                <input
                    type="url"
                    name="url"
                    id="url"
                    placeholder="https://example.com/"
                    maxlength="256"
                />
                <button type="submit" id="submit" class="button-primary">Shorten URL</button>
            </form>

            <div id="results-container">
                <h3>My Links</h3>
                <div id="results-empty">Create a link to show it here.</div>
                <div id="results"></div>
                <button id="results-clear" class="button-secondary" disabled>
                    Clear Links
                </button>
            </div>

            <div id="alert" class="hidden"></div>
        </main>

        <script src="js/script.js"></script>
    </body>
</html>
